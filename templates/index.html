<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W_Sigma.ai - Gen Alpha AI Chatbot</title>
    <meta name="description" content="W_Sigma.ai is your gen alpha AI bestie. A free personalized chatbot that speaks your language - no cap, fr fr. Chat with the most sigma AI ever.">
    <meta name="keywords" content="W_Sigma.ai, gen alpha chatbot, AI bestie, sigma AI, free chatbot, gen z chatbot, brainrot AI">
    <meta property="og:title" content="W_Sigma.ai - Gen Alpha AI Chatbot">
    <meta property="og:description" content="Your gen alpha AI bestie. Free personalized chatbot that actually speaks your language.">
    <meta property="og:type" content="website">
    <meta name="robots" content="index, follow">

    <!-- Markdown + Syntax Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --purple: #8338ec;
            --pink: #ff006e;
            --cyan: #00c8ff;
            --green: #4ade80;
            --bg: #0a0a0a;
            --surface: rgba(20, 20, 20, 0.7);
            --surface-solid: #141414;
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text: #e8e8e8;
            --text-dim: #888;
            --text-dimmer: #555;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-hover: rgba(255, 255, 255, 0.06);
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 20% 40%, rgba(131, 56, 236, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 60%, rgba(255, 0, 128, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 50% 80%, rgba(0, 200, 255, 0.04) 0%, transparent 50%);
            animation: bgMove 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes bgMove {
            0%, 100% { transform: translate(0, 0); }
            33% { transform: translate(-2%, 2%); }
            66% { transform: translate(2%, -2%); }
        }

        /* ====== SCROLLBAR ====== */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* ====== AUTH ====== */
        #auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 24px;
        }

        #auth-screen h1 {
            font-size: 3.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--purple), var(--pink), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        #auth-screen .subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .auth-box {
            background: var(--surface);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px;
            width: 360px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .auth-box h2 { text-align: center; font-size: 1.2rem; color: #ccc; font-weight: 500; }

        .auth-box input {
            padding: 13px 18px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--glass);
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .auth-box input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 3px rgba(131, 56, 236, 0.15);
        }

        .auth-box button {
            padding: 13px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            color: #fff;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .auth-box button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(131, 56, 236, 0.4);
        }
        .auth-box button:active { transform: translateY(0); }

        .auth-toggle { text-align: center; color: var(--text-dim); font-size: 0.9rem; }
        .auth-toggle span { color: var(--purple); cursor: pointer; font-weight: 600; }
        .auth-toggle span:hover { text-decoration: underline; }
        .auth-error { color: #ff4466; text-align: center; font-size: 0.85rem; min-height: 20px; }

        /* ====== MAIN LAYOUT ====== */
        #main {
            display: none;
            height: 100vh;
            flex-direction: row;
        }

        /* ====== SIDEBAR ====== */
        #sidebar {
            width: 290px;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #sidebar-header h2 {
            flex: 1;
            font-size: 1.05rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .new-chat-btn {
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--glass);
            color: #aaa;
            font-size: 1.1rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .new-chat-btn:hover {
            border-color: var(--purple);
            color: #fff;
            background: rgba(131, 56, 236, 0.15);
            box-shadow: 0 0 12px rgba(131, 56, 236, 0.2);
        }

        /* Search bar */
        #search-container {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }

        #search-input {
            width: 100%;
            padding: 9px 14px 9px 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--glass);
            color: #fff;
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        #search-input:focus { border-color: var(--purple); }

        #search-container { position: relative; }
        #search-container::before {
            content: '\1F50D';
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8rem;
            opacity: 0.4;
            pointer-events: none;
        }

        #chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 8px;
        }

        .chat-item {
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2px;
            transition: all 0.15s;
            border: 1px solid transparent;
        }

        .chat-item:hover { background: var(--glass-hover); }
        .chat-item.active {
            background: rgba(131, 56, 236, 0.08);
            border-color: rgba(131, 56, 236, 0.2);
        }

        .chat-item .chat-icon { font-size: 0.9rem; opacity: 0.4; }

        .chat-item .chat-info { flex: 1; min-width: 0; }

        .chat-item .chat-title {
            font-size: 0.84rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ccc;
        }

        .chat-item .chat-preview {
            font-size: 0.72rem;
            color: var(--text-dimmer);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item .chat-date {
            font-size: 0.68rem;
            color: var(--text-dimmer);
            margin-top: 2px;
        }

        .chat-item .delete-btn {
            opacity: 0;
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 4px 6px;
            border-radius: 6px;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .chat-item:hover .delete-btn { opacity: 1; }
        .chat-item .delete-btn:hover { color: #ff4466; background: rgba(255, 68, 102, 0.1); }

        #sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #sidebar-footer .user-avatar-small {
            width: 30px; height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        #sidebar-footer .user-name {
            flex: 1;
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        #sidebar-footer .logout-btn {
            padding: 6px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            font-size: 0.78rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        #sidebar-footer .logout-btn:hover { border-color: #ff4466; color: #ff4466; }

        /* ====== CHAT AREA ====== */
        #chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        #chat-header {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            background: rgba(10, 10, 10, 0.7);
        }

        #chat-header .avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 700;
            position: relative;
        }

        /* Online status pulse */
        .online-dot {
            position: absolute;
            bottom: 0; right: 0;
            width: 10px; height: 10px;
            background: var(--green);
            border-radius: 50%;
            border: 2px solid var(--bg);
        }

        .online-dot::after {
            content: '';
            position: absolute;
            top: -3px; left: -3px;
            width: 16px; height: 16px;
            border-radius: 50%;
            background: var(--green);
            opacity: 0;
            animation: pulse 2s ease-out infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.5); }
            100% { opacity: 0; transform: scale(1.5); }
        }

        #chat-header .info h2 {
            font-size: 0.95rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #chat-header .info .status-text {
            font-size: 0.72rem;
            color: var(--green);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ====== EMPTY STATE / WELCOME ====== */
        #empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-dimmer);
            gap: 16px;
            padding: 40px 20px;
        }

        .welcome-logo {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--purple), var(--pink), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .welcome-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text);
            text-align: center;
        }

        .welcome-sub {
            font-size: 0.95rem;
            color: var(--text-dim);
            text-align: center;
            max-width: 400px;
        }

        .suggested-prompts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
            max-width: 460px;
            width: 100%;
        }

        .suggested-prompt {
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: blur(10px);
            color: var(--text-dim);
            font-size: 0.88rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .suggested-prompt:hover {
            border-color: rgba(131, 56, 236, 0.3);
            background: rgba(131, 56, 236, 0.08);
            color: var(--text);
            transform: translateY(-1px);
        }

        .suggested-prompt .prompt-icon { font-size: 1.2rem; }

        /* ====== MESSAGES ====== */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }

        .date-divider {
            text-align: center;
            color: var(--text-dimmer);
            font-size: 0.72rem;
            padding: 12px 0 4px;
        }

        .msg-row {
            display: flex;
            gap: 10px;
            max-width: 75%;
            animation: msgSlide 0.3s ease-out;
            position: relative;
        }

        .msg-row.no-anim { animation: none; }

        .msg-row.user-row { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.bot-row { align-self: flex-start; }

        @keyframes msgSlide {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .bot-row .msg-avatar {
            background: linear-gradient(135deg, var(--purple), var(--pink));
        }

        .user-row .msg-avatar {
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
        }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.93rem;
            line-height: 1.6;
            word-wrap: break-word;
            position: relative;
        }

        .user-row .msg-bubble {
            background: linear-gradient(135deg, var(--purple), #6b21a8);
            border-bottom-right-radius: 6px;
        }

        .bot-row .msg-bubble {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-bottom-left-radius: 6px;
        }

        .msg-bubble .msg-name {
            font-size: 0.7rem;
            color: var(--pink);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .msg-bubble .msg-time {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.25);
            margin-top: 6px;
            text-align: right;
        }

        /* Copy button on bot messages */
        .msg-copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.5);
            color: var(--text-dim);
            font-size: 0.7rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s, background 0.15s;
            font-family: inherit;
            backdrop-filter: blur(10px);
        }

        .bot-row:hover .msg-copy-btn { opacity: 1; }
        .msg-copy-btn:hover { background: rgba(131, 56, 236, 0.3); color: #fff; }

        /* Markdown content styling */
        .msg-content p { margin: 0 0 8px; }
        .msg-content p:last-child { margin-bottom: 0; }
        .msg-content strong { color: #fff; font-weight: 600; }
        .msg-content em { color: #ccc; }
        .msg-content ul, .msg-content ol { margin: 6px 0; padding-left: 20px; }
        .msg-content li { margin: 3px 0; }
        .msg-content h1, .msg-content h2, .msg-content h3 {
            margin: 10px 0 6px;
            color: #fff;
        }
        .msg-content h1 { font-size: 1.2rem; }
        .msg-content h2 { font-size: 1.1rem; }
        .msg-content h3 { font-size: 1rem; }
        .msg-content blockquote {
            border-left: 3px solid var(--purple);
            padding: 4px 12px;
            margin: 8px 0;
            background: rgba(131, 56, 236, 0.06);
            border-radius: 0 8px 8px 0;
            color: #bbb;
        }
        .msg-content a { color: var(--cyan); text-decoration: none; }
        .msg-content a:hover { text-decoration: underline; }

        /* Inline code */
        .msg-content code:not(pre code) {
            background: rgba(255, 255, 255, 0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.88em;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: #e8b4f8;
        }

        /* Code blocks */
        .msg-content pre {
            margin: 10px 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
        }

        .msg-content pre code {
            display: block;
            padding: 16px !important;
            font-size: 0.85rem;
            font-family: 'SF Mono', 'Fira Code', monospace;
            line-height: 1.5;
            overflow-x: auto;
            background: rgba(0, 0, 0, 0.4) !important;
        }

        .code-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.04);
            border-bottom: 1px solid var(--border);
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        .code-copy-btn {
            padding: 3px 10px;
            border-radius: 5px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            font-size: 0.7rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }

        .code-copy-btn:hover { background: var(--glass-hover); color: #fff; }

        /* Typing indicator */
        .typing-row {
            align-self: flex-start;
            display: flex;
            gap: 10px;
            display: none;
        }

        .typing-bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 14px 18px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-bubble span {
            display: block;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--text-dim);
            animation: typeBounce 1.4s infinite;
        }

        .typing-bubble span:nth-child(2) { animation-delay: 0.15s; }
        .typing-bubble span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes typeBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* ====== INPUT AREA ====== */
        #input-area {
            padding: 12px 20px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            background: rgba(10, 10, 10, 0.7);
        }

        #msg-input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--glass);
            color: #fff;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            resize: none;
            min-height: 44px;
            max-height: 140px;
            line-height: 1.5;
            overflow-y: auto;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #msg-input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 2px rgba(131, 56, 236, 0.12);
        }

        #msg-input::placeholder { color: var(--text-dimmer); }

        #send-btn {
            padding: 12px 20px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
            height: 44px;
        }

        #send-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(131, 56, 236, 0.4);
        }
        #send-btn:active { transform: translateY(0); }
        #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ====== MOBILE ====== */
        #sidebar-toggle {
            display: none;
            position: fixed;
            top: 12px; left: 12px;
            z-index: 100;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(20px);
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 98;
        }

        @media (max-width: 700px) {
            #sidebar {
                position: fixed;
                left: 0;
                z-index: 99;
                height: 100vh;
                transform: translateX(-100%);
            }
            #sidebar.open { transform: translateX(0); }
            #sidebar.open ~ .sidebar-overlay { display: block; }
            #sidebar-toggle { display: block; }
            .msg-row { max-width: 90%; }
            .suggested-prompts { grid-template-columns: 1fr; }
            #chat-header { padding-left: 56px; }
        }

        /* ====== TRANSITIONS ====== */
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
    <h1>W_Sigma.ai</h1>
    <p class="subtitle">ur gen alpha ai bestie</p>

    <div class="auth-box" id="login-box">
        <h2>log in</h2>
        <input type="text" id="login-user" placeholder="username" maxlength="30" autocomplete="username">
        <input type="password" id="login-pass" placeholder="password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        <div class="auth-error" id="login-error"></div>
        <button onclick="doLogin()">lets gooo</button>
        <div class="auth-toggle">no account? <span onclick="showSignup()">sign up</span></div>
    </div>

    <div class="auth-box" id="signup-box" style="display:none">
        <h2>sign up</h2>
        <input type="text" id="signup-user" placeholder="pick a username" maxlength="30" autocomplete="username">
        <input type="password" id="signup-pass" placeholder="pick a password" autocomplete="new-password" onkeydown="if(event.key==='Enter')doSignup()">
        <div class="auth-error" id="signup-error"></div>
        <button onclick="doSignup()">create account</button>
        <div class="auth-toggle">already got one? <span onclick="showLogin()">log in</span></div>
    </div>
</div>

<!-- MAIN APP -->
<button id="sidebar-toggle" onclick="toggleSidebar()">&#9776;</button>
<div class="sidebar-overlay" onclick="closeSidebarMobile()"></div>

<div id="main">
    <!-- SIDEBAR -->
    <div id="sidebar">
        <div id="sidebar-header">
            <h2>W_Sigma.ai</h2>
            <button class="new-chat-btn" onclick="newChat()" title="New chat (Ctrl+N)">+</button>
        </div>
        <div id="search-container">
            <input type="text" id="search-input" placeholder="Search chats..." oninput="filterChats()">
        </div>
        <div id="chat-list"></div>
        <div id="sidebar-footer">
            <div class="user-avatar-small" id="user-avatar-small"></div>
            <div class="user-name" id="user-display"></div>
            <button class="logout-btn" onclick="doLogout()">logout</button>
        </div>
    </div>

    <!-- CHAT -->
    <div id="chat-area">
        <div id="chat-header">
            <div class="avatar">
                W
                <div class="online-dot"></div>
            </div>
            <div class="info">
                <h2>W_Sigma.ai</h2>
                <span class="status-text" id="status-text">online rn</span>
            </div>
        </div>

        <div id="empty-state">
            <div class="welcome-logo">W</div>
            <div class="welcome-title">whats good! im W_Sigma.ai</div>
            <div class="welcome-sub">ur AI bestie thats actually useful. ask me anything - homework, code, creative stuff, or just vibe</div>
            <div class="suggested-prompts">
                <button class="suggested-prompt" onclick="sendSuggested('tell me a joke')">
                    <span class="prompt-icon">&#128514;</span>
                    <span>tell me a joke</span>
                </button>
                <button class="suggested-prompt" onclick="sendSuggested('roast me')">
                    <span class="prompt-icon">&#128293;</span>
                    <span>roast me</span>
                </button>
                <button class="suggested-prompt" onclick="sendSuggested('whats trending rn')">
                    <span class="prompt-icon">&#128200;</span>
                    <span>whats trending rn</span>
                </button>
                <button class="suggested-prompt" onclick="sendSuggested('help me with homework')">
                    <span class="prompt-icon">&#128218;</span>
                    <span>help me with homework</span>
                </button>
            </div>
        </div>

        <div id="messages" style="display:none">
            <div class="typing-row" id="typing">
                <div class="msg-avatar" style="background: linear-gradient(135deg, var(--purple), var(--pink));">W</div>
                <div class="typing-bubble">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <div id="input-area">
            <textarea id="msg-input" placeholder="type somethin..." rows="1"></textarea>
            <button id="send-btn" onclick="sendMsg()">send</button>
        </div>
    </div>
</div>

<script>
    // ====== SETUP marked.js ======
    marked.setOptions({
        highlight: function(code, lang) {
            if (lang && hljs.getLanguage(lang)) {
                try { return hljs.highlight(code, { language: lang }).value; } catch(e) {}
            }
            try { return hljs.highlightAuto(code).value; } catch(e) {}
            return code;
        },
        breaks: true,
        gfm: true,
    });

    let currentUser = '';
    let currentChatId = '';
    let allChats = [];

    // ====== AUTH ======
    function showSignup() {
        document.getElementById('login-box').style.display = 'none';
        document.getElementById('signup-box').style.display = 'flex';
    }
    function showLogin() {
        document.getElementById('signup-box').style.display = 'none';
        document.getElementById('login-box').style.display = 'flex';
    }

    async function doLogin() {
        const user = document.getElementById('login-user').value.trim();
        const pass = document.getElementById('login-pass').value;
        const err = document.getElementById('login-error');
        if (!user || !pass) { err.textContent = 'fill in both fields'; return; }

        const res = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        });
        const data = await res.json();
        if (data.ok) { currentUser = user; enterApp(); }
        else { err.textContent = data.msg; }
    }

    async function doSignup() {
        const user = document.getElementById('signup-user').value.trim();
        const pass = document.getElementById('signup-pass').value;
        const err = document.getElementById('signup-error');
        if (!user || !pass) { err.textContent = 'fill in both fields'; return; }

        const res = await fetch('/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
        });
        const data = await res.json();
        if (data.ok) { currentUser = user; enterApp(); }
        else { err.textContent = data.msg; }
    }

    async function doLogout() {
        await fetch('/logout', { method: 'POST' });
        currentUser = '';
        currentChatId = '';
        document.getElementById('main').style.display = 'none';
        document.getElementById('auth-screen').style.display = 'flex';
    }

    // ====== APP ======
    async function enterApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main').style.display = 'flex';
        document.getElementById('user-display').textContent = currentUser;
        document.getElementById('user-avatar-small').textContent = currentUser.charAt(0).toUpperCase();
        await loadChatList();
        showEmptyState();
    }

    function showEmptyState() {
        document.getElementById('empty-state').style.display = 'flex';
        document.getElementById('messages').style.display = 'none';
        currentChatId = '';
    }

    // ====== CHAT LIST ======
    async function loadChatList() {
        const res = await fetch('/chats');
        const data = await res.json();
        allChats = data.chats;
        renderChatList(allChats);
    }

    function renderChatList(chats) {
        const list = document.getElementById('chat-list');
        list.innerHTML = '';

        chats.forEach(chat => {
            const item = document.createElement('div');
            item.className = 'chat-item' + (chat.id === currentChatId ? ' active' : '');
            const preview = chat.preview ? `<div class="chat-preview">${escapeHtml(chat.preview)}</div>` : '';
            item.innerHTML = `
                <div class="chat-icon">&#128172;</div>
                <div class="chat-info">
                    <div class="chat-title">${escapeHtml(chat.title)}</div>
                    ${preview}
                    <div class="chat-date">${formatDateShort(chat.created)}</div>
                </div>
                <button class="delete-btn" onclick="event.stopPropagation(); deleteChat('${chat.id}')" title="delete">&#10005;</button>
            `;
            item.onclick = () => openChat(chat.id);
            list.appendChild(item);
        });
    }

    function filterChats() {
        const query = document.getElementById('search-input').value.toLowerCase().trim();
        if (!query) {
            renderChatList(allChats);
            return;
        }
        const filtered = allChats.filter(c =>
            c.title.toLowerCase().includes(query) ||
            (c.preview && c.preview.toLowerCase().includes(query))
        );
        renderChatList(filtered);
    }

    async function newChat() {
        const res = await fetch('/chats/new', { method: 'POST' });
        const data = await res.json();
        currentChatId = data.id;
        await loadChatList();
        showChatMessages([]);
        document.getElementById('msg-input').focus();
        closeSidebarMobile();
    }

    async function openChat(chatId) {
        currentChatId = chatId;
        const res = await fetch(`/chats/${chatId}`);
        const data = await res.json();
        await loadChatList();
        showChatMessages(data.messages || []);
        document.getElementById('msg-input').focus();
        closeSidebarMobile();
    }

    async function deleteChat(chatId) {
        await fetch(`/chats/${chatId}`, { method: 'DELETE' });
        if (currentChatId === chatId) showEmptyState();
        await loadChatList();
    }

    // ====== MESSAGES ======
    function showChatMessages(messages) {
        document.getElementById('empty-state').style.display = 'none';
        const msgContainer = document.getElementById('messages');
        msgContainer.style.display = 'flex';

        const typing = document.getElementById('typing');
        msgContainer.innerHTML = '';
        msgContainer.appendChild(typing);

        if (messages.length === 0) {
            addMsg('bot', `yooo ${currentUser}!! new chat lets gooo, whats on ur mind`, null, false);
        } else {
            let lastDate = '';
            messages.forEach(msg => {
                const msgDate = msg.time ? msg.time.split(' ')[0] : '';
                if (msgDate && msgDate !== lastDate) {
                    lastDate = msgDate;
                    const divider = document.createElement('div');
                    divider.className = 'date-divider';
                    divider.textContent = formatDate(msgDate);
                    msgContainer.insertBefore(divider, typing);
                }
                const type = msg.role === 'user' ? 'user' : 'bot';
                addMsg(type, msg.text, msg.time, false);
            });
        }
        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    function renderMarkdown(text) {
        try {
            let html = marked.parse(text);
            // Add code headers with copy buttons to pre blocks
            html = html.replace(/<pre><code class="language-(\w+)">/g,
                '<pre><div class="code-header"><span>$1</span><button class="code-copy-btn" onclick="copyCode(this)">copy</button></div><code class="language-$1">');
            html = html.replace(/<pre><code>/g,
                '<pre><div class="code-header"><span>code</span><button class="code-copy-btn" onclick="copyCode(this)">copy</button></div><code>');
            return html;
        } catch(e) {
            return escapeHtml(text);
        }
    }

    function addMsg(type, text, time, animate = true) {
        const messages = document.getElementById('messages');
        const typing = document.getElementById('typing');

        const row = document.createElement('div');
        row.className = `msg-row ${type === 'user' ? 'user-row' : 'bot-row'}${!animate ? ' no-anim' : ''}`;

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';

        if (type === 'user') {
            avatar.textContent = currentUser.charAt(0).toUpperCase();
            avatar.style.background = 'linear-gradient(135deg, #3b82f6, #06b6d4)';
        } else {
            avatar.textContent = 'W';
        }

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';

        const timeHtml = time ? `<div class="msg-time">${formatTime(time)}</div>` : '';

        if (type === 'bot') {
            const nameHtml = '<div class="msg-name">W_Sigma.ai</div>';
            const contentHtml = `<div class="msg-content">${renderMarkdown(text)}</div>`;
            bubble.innerHTML = nameHtml + contentHtml + timeHtml;

            // Copy button
            const copyBtn = document.createElement('button');
            copyBtn.className = 'msg-copy-btn';
            copyBtn.textContent = 'copy';
            copyBtn.onclick = (e) => {
                e.stopPropagation();
                navigator.clipboard.writeText(text).then(() => {
                    copyBtn.textContent = 'copied!';
                    setTimeout(() => { copyBtn.textContent = 'copy'; }, 1500);
                });
            };
            bubble.appendChild(copyBtn);
        } else {
            bubble.innerHTML = `<div class="msg-content">${escapeHtml(text)}</div>${timeHtml}`;
        }

        row.appendChild(avatar);
        row.appendChild(bubble);
        messages.insertBefore(row, typing);
        if (animate) messages.scrollTop = messages.scrollHeight;
        return row;
    }

    function addMsgTypewriter(text, time) {
        const messages = document.getElementById('messages');
        const typing = document.getElementById('typing');

        const row = document.createElement('div');
        row.className = 'msg-row bot-row';

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = 'W';

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';

        const nameDiv = document.createElement('div');
        nameDiv.className = 'msg-name';
        nameDiv.textContent = 'W_Sigma.ai';

        const contentDiv = document.createElement('div');
        contentDiv.className = 'msg-content';

        const timeDiv = document.createElement('div');
        timeDiv.className = 'msg-time';
        timeDiv.textContent = formatTime(time);
        timeDiv.style.display = 'none';

        bubble.appendChild(nameDiv);
        bubble.appendChild(contentDiv);
        bubble.appendChild(timeDiv);

        row.appendChild(avatar);
        row.appendChild(bubble);
        messages.insertBefore(row, typing);

        // Typewriter effect
        let i = 0;
        const speed = 12;
        let buffer = '';

        function typeChar() {
            if (i < text.length) {
                buffer += text[i];
                i++;
                // Render markdown progressively every few chars or at end
                if (i % 3 === 0 || i === text.length) {
                    contentDiv.innerHTML = renderMarkdown(buffer);
                }
                messages.scrollTop = messages.scrollHeight;
                setTimeout(typeChar, speed);
            } else {
                // Final render
                contentDiv.innerHTML = renderMarkdown(text);
                timeDiv.style.display = 'block';

                // Add copy button
                const copyBtn = document.createElement('button');
                copyBtn.className = 'msg-copy-btn';
                copyBtn.textContent = 'copy';
                copyBtn.onclick = (e) => {
                    e.stopPropagation();
                    navigator.clipboard.writeText(text).then(() => {
                        copyBtn.textContent = 'copied!';
                        setTimeout(() => { copyBtn.textContent = 'copy'; }, 1500);
                    });
                };
                bubble.appendChild(copyBtn);

                messages.scrollTop = messages.scrollHeight;
            }
        }
        typeChar();
    }

    function copyCode(btn) {
        const pre = btn.closest('pre');
        const code = pre.querySelector('code');
        navigator.clipboard.writeText(code.textContent).then(() => {
            btn.textContent = 'copied!';
            setTimeout(() => { btn.textContent = 'copy'; }, 1500);
        });
    }

    // ====== SUGGESTED PROMPTS ======
    async function sendSuggested(text) {
        // Create a new chat and send the suggested prompt
        if (!currentChatId) {
            const res = await fetch('/chats/new', { method: 'POST' });
            const data = await res.json();
            currentChatId = data.id;
            showChatMessages([]);
        }
        document.getElementById('msg-input').value = text;
        sendMsg();
    }

    // ====== SENDING ======
    let isSending = false;

    async function sendMsg(retryText = null) {
        if (isSending && !retryText) return;

        const input = document.getElementById('msg-input');
        const text = retryText || input.value.trim();
        if (!text) return;

        isSending = true;
        document.getElementById('send-btn').disabled = true;

        // Auto-create a chat if none selected
        if (!currentChatId) {
            const res = await fetch('/chats/new', { method: 'POST' });
            const data = await res.json();
            currentChatId = data.id;
            showChatMessages([]);
        }

        if (!retryText) {
            input.value = '';
            input.style.height = 'auto';
            addMsg('user', text, `_ ${nowTime()}`);
        }

        const typing = document.getElementById('typing');
        typing.style.display = 'flex';
        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

        // Try up to 3 times
        let lastError = '';
        for (let attempt = 0; attempt < 3; attempt++) {
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, chat_id: currentChatId })
                });
                const data = await res.json();

                if (data.error === 'not logged in') {
                    typing.style.display = 'none';
                    isSending = false;
                    document.getElementById('send-btn').disabled = false;
                    doLogout();
                    return;
                }

                if (data.reply) {
                    typing.style.display = 'none';
                    addMsgTypewriter(data.reply, `_ ${nowTime()}`);
                    isSending = false;
                    document.getElementById('send-btn').disabled = false;
                    await loadChatList();
                    return;
                }

                if (data.error === 'rate_limit') {
                    updateStatus('waiting for rate limit...');
                    await sleep(30);
                    updateStatus('online rn');
                    continue;
                }

                lastError = data.msg || 'unknown error';
                if (attempt < 2) {
                    updateStatus('retrying...');
                    await sleep(5);
                    updateStatus('online rn');
                    continue;
                }
            } catch (e) {
                lastError = 'network error';
                if (attempt < 2) {
                    updateStatus('reconnecting...');
                    await sleep(5);
                    updateStatus('online rn');
                    continue;
                }
            }
        }

        // All retries failed
        typing.style.display = 'none';
        isSending = false;
        document.getElementById('send-btn').disabled = false;
        addMsg('bot', `aye im having trouble rn (${lastError}). hit send again in a min`, `_ ${nowTime()}`);
        await loadChatList();
    }

    function sleep(seconds) {
        return new Promise(resolve => setTimeout(resolve, seconds * 1000));
    }

    function updateStatus(text) {
        document.getElementById('status-text').textContent = text;
    }

    // ====== AUTO-GROWING TEXTAREA ======
    const msgInput = document.getElementById('msg-input');
    if (msgInput) {
        msgInput.addEventListener('input', function() {
            this.style.height = 'auto';
            const maxH = 140; // ~5 lines
            this.style.height = Math.min(this.scrollHeight, maxH) + 'px';
        });

        msgInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMsg();
            }
        });
    }

    // ====== KEYBOARD SHORTCUTS ======
    document.addEventListener('keydown', function(e) {
        // Ctrl+N or Cmd+N for new chat
        if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
            e.preventDefault();
            newChat();
        }
    });

    // ====== HELPERS ======
    function escapeHtml(text) {
        const d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    function nowTime() { return new Date().toTimeString().substring(0, 5); }

    function formatTime(timeStr) {
        if (!timeStr) return '';
        const parts = timeStr.split(' ');
        if (parts.length > 1) return parts[1].substring(0, 5);
        return '';
    }

    function formatDate(dateStr) {
        const today = new Date().toISOString().split('T')[0];
        if (dateStr === today) return 'today';
        const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        if (dateStr === yesterday) return 'yesterday';
        return dateStr;
    }

    function formatDateShort(dateStr) {
        if (!dateStr) return '';
        const d = dateStr.split(' ')[0];
        return formatDate(d);
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    function closeSidebarMobile() {
        document.getElementById('sidebar').classList.remove('open');
    }
</script>
</body>
</html>
